spring:
  application:
    name: api-gateway
  
  # Enable Virtual Threads
  threads:
    virtual:
      enabled: true

  # JDBC configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gateway_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  # Redis configuration for Rate Limiting
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/master/protocol/openid-connect/certs}



server:
  port: 8443
  ssl:
    bundle: gateway-bundle

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

# Eureka Client Configuration
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

logging:
  level:
    com.example.api_gateway: DEBUG
